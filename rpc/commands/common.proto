syntax = "proto3";

package cc.arduino.cli.commands;

option go_package = "github.com/arduino/arduino-cli/rpc/commands";

message Instance {
	// The ID of the instance.
	int32 id = 1;
}

message DownloadProgress {
	// URL of the download.
	string url = 1;
	// The file being downloaded.
	string file = 2;
	// Total size of the file being downloaded.
	int64 total_size = 3;
	// Size of the downloaded portion of the file.
	int64 downloaded = 4;
	// Whether the download is complete.
	bool completed = 5;
}

message TaskProgress {
    // Description of the task.
    string name = 1;
    // Additional information about the task.
    string message = 2;
    // Whether the task is complete.
    bool completed = 3;
}

message Programmer {
	string platform = 1;
	string id = 2;
	string name = 3;
}

message Port {
    // Address of the port (e.g., `/dev/ttyACM0`).
    string address = 1;
    // A human friendly description of the port (e.g. 'ttyACM0')
    string address_label = 5;
    // Protocol of the port (e.g., `serial`).
    string protocol = 2;
    // A human friendly description of the protocol (e.g., "Serial Port (USB)").
    string protocol_label = 3;
    // The board port properties
    map<string, string> properties = 6;
    // The board model identification properties
    map<string, string> identification_properties = 7;
}